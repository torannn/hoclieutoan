<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ôn thi Tuyển sinh lớp 9 — Toán học</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/g9-answer-utils.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --duo-green: #58cc02;
      --duo-green-dark: #46a302;
      --duo-blue: #1cb0f6;
      --duo-red: #ff4b4b;
      --duo-yellow: #ffc800;
      --duo-purple: #ce82ff;
      --duo-gray: #afafaf;
      --duo-bg: #f7f7f7;
      --duo-card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--duo-bg);
      color: #1c1c1e;
      min-height: 100vh;
      margin: 0;
    }
    /* ——— HEADER ——— */
    .site-header {
      background: #fff;
      border-bottom: 2px solid #e5e5e5;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-logo {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--duo-green);
      letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .xp-pill {
      display: flex; align-items: center; gap: 6px;
      background: #fff7e0;
      border: 2px solid var(--duo-yellow);
      border-radius: 999px;
      padding: 4px 14px;
      font-weight: 800;
      font-size: 0.95rem;
      color: #b45309;
    }
    .streak-pill {
      display: flex; align-items: center; gap: 6px;
      background: #fff0f0;
      border: 2px solid var(--duo-red);
      border-radius: 999px;
      padding: 4px 14px;
      font-weight: 800;
      font-size: 0.95rem;
      color: #dc2626;
    }
    /* ——— HERO BANNER ——— */
    .hero {
      background: linear-gradient(135deg, #58cc02 0%, #1cb0f6 100%);
      color: #fff;
      padding: 40px 24px 48px;
      text-align: center;
    }
    .hero h1 { font-size: 2rem; font-weight: 900; margin: 0 0 8px; letter-spacing: -0.5px; }
    .hero p { font-size: 1.05rem; opacity: 0.92; margin: 0 0 24px; }
    .hero-stats {
      display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
    }
    .hero-stat {
      background: rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 12px 20px;
      text-align: center;
    }
    .hero-stat .num { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    .hero-stat .lbl { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
    /* ——— LAYOUT ——— */
    .main-layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px 80px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      position: sticky;
      top: 80px;
    }
    .sidebar-card {
      background: #fff;
      border-radius: 16px;
      border: 2px solid #e5e5e5;
      padding: 16px;
      margin-bottom: 16px;
    }
    .sidebar-card h3 { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin: 0 0 12px; }
    .group-filter-btn {
      display: block; width: 100%;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.88rem;
      margin-bottom: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      background: #f5f5f5;
      color: #444;
      text-align: left;
      transition: all 0.15s;
    }
    .group-filter-btn:hover { background: #eee; }
    .group-filter-btn.active { border-color: currentColor; background: #fff; }
    .prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .prog-icon { font-size: 1.2rem; }
    .prog-bar-wrap { flex: 1; }
    .prog-label { font-size: 0.78rem; font-weight: 700; color: #555; margin-bottom: 2px; }
    .prog-bar { height: 8px; background: #e5e5e5; border-radius: 999px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
    /* ——— TOPIC GRID ——— */
    .topic-grid {
      flex: 1;
      min-width: 0;
    }
    .group-section { margin-bottom: 32px; }
    .group-title {
      font-size: 0.85rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.8px; color: #888; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .group-title span { font-size: 1.1rem; }
    .topic-cards { display: flex; flex-direction: column; gap: 12px; }
    /* ——— TOPIC CARD ——— */
    .topic-card {
      background: #fff;
      border-radius: 20px;
      border: 3px solid transparent;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .topic-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .topic-card:active { transform: translateY(0); }
    .topic-card.locked { opacity: 0.55; cursor: default; }
    .topic-card.locked:hover { transform: none; box-shadow: none; }
    .topic-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      font-weight: 900;
    }
    .topic-info { flex: 1; min-width: 0; }
    .topic-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; opacity: 0.7; margin-bottom: 2px; }
    .topic-title { font-size: 1rem; font-weight: 800; color: #1c1c1e; margin-bottom: 6px; line-height: 1.3; }
    .topic-meta { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: #888; font-weight: 700; }
    .topic-progress-bar { height: 8px; border-radius: 999px; overflow: hidden; margin-top: 8px; background: #f0f0f0; }
    .topic-progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
    .topic-progress-text { font-size: 0.75rem; font-weight: 800; }
    .topic-action {
      flex-shrink: 0;
    }
    .btn-start {
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-start:hover { filter: brightness(1.08); transform: scale(1.03); }
    .btn-start:active { transform: scale(0.97); }
    .crown-badge {
      position: absolute; top: 12px; right: 16px;
      font-size: 1.1rem;
    }
    /* ——— LOCK overlay ——— */
    .lock-icon { font-size: 1.4rem; color: #aaa; }
    /* ——— MODAL chọn mode ——— */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      background: #fff;
      border-radius: 24px 24px 16px 16px;
      padding: 28px 24px 32px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-topic-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .modal-topic-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .modal-topic-info h2 { font-size: 1.1rem; font-weight: 900; margin: 0 0 2px; }
    .modal-topic-info p { font-size: 0.82rem; color: #888; font-weight: 700; margin: 0; }
    .mode-btn {
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 16px 18px;
      border-radius: 16px; border: 2px solid #e5e5e5;
      background: #fff; cursor: pointer; margin-bottom: 10px;
      text-align: left; transition: all 0.15s;
    }
    .mode-btn:hover { border-color: currentColor; background: #fafafa; }
    .mode-btn:last-child { margin-bottom: 0; }
    .mode-btn-icon { font-size: 1.6rem; width: 40px; text-align: center; }
    .mode-btn-info h3 { font-size: 0.95rem; font-weight: 800; margin: 0 0 2px; color: #1c1c1e; }
    .mode-btn-info p { font-size: 0.8rem; color: #888; font-weight: 600; margin: 0; }
    .modal-cancel { width: 100%; padding: 12px; background: #f5f5f5; border: none; border-radius: 12px; font-weight: 800; font-size: 0.95rem; color: #666; cursor: pointer; margin-top: 12px; }
    .modal-cancel:hover { background: #eee; }
    /* ——— RESPONSIVE ——— */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main-layout { padding: 20px 12px 80px; }
      .hero h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-logo">
    <span>📚</span> Toán 9 — Ôn thi tuyển sinh
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <div class="streak-pill" id="streakPill">🔥 <span id="streakCount">0</span></div>
    <div class="xp-pill" id="xpPill">⚡ <span id="xpCount">0</span> XP</div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Ôn thi Tuyển sinh lớp 9 → 10 🎯</h1>
  <p>Chọn chủ đề, luyện từng câu hỏi, theo dõi tiến độ của bạn</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="num" id="statDone">0</div>
      <div class="lbl">Câu đã làm</div>
    </div>
    <div class="hero-stat">
      <div class="num" id="statCorrect">0</div>
      <div class="lbl">Câu đúng</div>
    </div>
    <div class="hero-stat">
      <div class="num" id="statTopics">0/12</div>
      <div class="lbl">Chủ đề đã mở</div>
    </div>
    <div class="hero-stat">
      <div class="num" id="statAccuracy">—</div>
      <div class="lbl">Tỉ lệ đúng</div>
    </div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="main-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <h3>Lọc theo phần</h3>
      <button class="group-filter-btn active" data-group="all" onclick="filterGroup('all', this)">🌐 Tất cả</button>
      <button class="group-filter-btn" data-group="algebra" onclick="filterGroup('algebra', this)">🔢 Đại số</button>
      <button class="group-filter-btn" data-group="geometry" onclick="filterGroup('geometry', this)">📐 Hình học phẳng</button>
      <button class="group-filter-btn" data-group="solid" onclick="filterGroup('solid', this)">🧊 Hình khối</button>
      <button class="group-filter-btn" data-group="stat" onclick="filterGroup('stat', this)">📊 Thống kê & Xác suất</button>
    </div>
    <div class="sidebar-card">
      <h3>Tiến độ tổng</h3>
      <div id="sidebarProgress"></div>
    </div>
  </aside>

  <!-- TOPIC GRID -->
  <div class="topic-grid" id="topicGrid">
    <div style="text-align:center; padding: 40px; color:#aaa; font-weight:700;">Đang tải...</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-topic-header">
      <div class="modal-topic-icon" id="modalIcon"></div>
      <div class="modal-topic-info">
        <h2 id="modalTitle"></h2>
        <p id="modalMeta"></p>
      </div>
    </div>
    <button class="mode-btn" id="modeTheory" onclick="startMode('theory')" style="color:#f59e0b">
      <div class="mode-btn-icon">📚</div>
      <div class="mode-btn-info">
        <h3>Sổ tay Lý thuyết</h3>
        <p>Ôn tập các công thức và kiến thức trọng tâm</p>
      </div>
    </button>
    <button class="mode-btn" id="modeMC" onclick="startMode('mc')" style="color:#3b82f6">
      <div class="mode-btn-icon">🎯</div>
      <div class="mode-btn-info">
        <h3>Trắc nghiệm nhanh</h3>
        <p>Luyện <span id="modalMCCount"></span> câu trắc nghiệm, chọn đáp án ngay</p>
      </div>
    </button>
    <button class="mode-btn" id="modeEssay" onclick="startMode('essay')" style="color:#10b981">
      <div class="mode-btn-icon">✏️</div>
      <div class="mode-btn-info">
        <h3>Bài tập tự luận</h3>
        <p>Xem <span id="modalEssayCount"></span> bài tự luận, tự giải rồi xem gợi ý</p>
      </div>
    </button>
    <button class="mode-btn" id="modeAll" onclick="startMode('all')" style="color:#a855f7">
      <div class="mode-btn-icon">🚀</div>
      <div class="mode-btn-info">
        <h3>Ôn tập hỗn hợp</h3>
        <p>Tất cả <span id="modalAllCount"></span> câu, ngẫu nhiên xen kẽ</p>
      </div>
    </button>
    <button class="mode-btn" id="modeWrong" onclick="startMode('wrong')" style="color:#ef4444">
      <div class="mode-btn-icon">🔁</div>
      <div class="mode-btn-info">
        <h3>Ôn lại câu sai</h3>
        <p id="modeWrongMeta">Luyện lại các câu làm sai trước đó</p>
      </div>
    </button>
    <button class="modal-cancel" onclick="closeModal(null)">Huỷ</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'g9TuyenSinhProgressV1';
const MANIFEST_PATH = 'data/grade9/on-thi-tuyen-sinh/sections-manifest.json';
const CHUNKS_PATH = 'data/grade9/on-thi-tuyen-sinh/ON_TAP_LOP_9_chunks.json';
const ANSWERS_PATH = 'data/grade9/on-thi-tuyen-sinh/answers.json';

let manifest = null;
let progress = {};
let currentTopic = null;
let currentGroup = 'all';
let allChunks = [];
let answerLookup = {};
let topicAnswerStats = {};

/* ——— LOAD ——— */
async function init() {
  progress = loadProgress();
  updateHeaderStats();

  const [manifestResp, chunksResp, answersResp] = await Promise.all([
    fetch(MANIFEST_PATH),
    fetch(CHUNKS_PATH),
    fetch(ANSWERS_PATH).catch(() => null)
  ]);
  manifest = await manifestResp.json();
  const chunksData = await chunksResp.json();
  allChunks = chunksData.chunks || [];
  let rawAnswers = {};
  if (answersResp && answersResp.ok) {
    try {
      rawAnswers = await answersResp.json();
    } catch {
      rawAnswers = {};
    }
  }

  if (window.G9AnswerUtils && typeof window.G9AnswerUtils.buildAnswerLookup === 'function') {
    const built = window.G9AnswerUtils.buildAnswerLookup(allChunks, rawAnswers);
    answerLookup = built.lookup || {};
    if (built.conflicts && built.conflicts.length) {
      console.warn('[g9-answers] Conflicts detected between embedded answers and answers.json. Embedded chunk answers were kept.', built.conflicts.slice(0, 50));
    }
  }

  topicAnswerStats = {};
  manifest.topics.forEach(topic => {
    if (window.G9AnswerUtils && typeof window.G9AnswerUtils.getTopicAnswerStats === 'function') {
      topicAnswerStats[topic.id] = window.G9AnswerUtils.getTopicAnswerStats(allChunks, answerLookup, topic.section);
    } else {
      topicAnswerStats[topic.id] = {
        mcTotal: topic.mcCount || 0,
        mcResolved: 0,
        essayTotal: topic.essayCount || 0,
        essayResolved: 0
      };
    }
  });

  renderSidebarProgress();
  renderTopics();
}

/* ——— PROGRESS STORAGE ——— */
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

/* ——— STATS ——— */
function updateHeaderStats() {
  let totalDone = 0, totalCorrect = 0, topicsStarted = 0;
  Object.entries(progress).forEach(([tid, p]) => {
    if (p.done > 0) topicsStarted++;
    totalDone += p.done || 0;
    totalCorrect += p.correct || 0;
  });
  document.getElementById('statDone').textContent = totalDone;
  document.getElementById('statCorrect').textContent = totalCorrect;
  document.getElementById('statTopics').textContent = topicsStarted + '/12';
  document.getElementById('statAccuracy').textContent =
    totalDone > 0 ? Math.round(totalCorrect / totalDone * 100) + '%' : '—';
  document.getElementById('xpCount').textContent = totalCorrect * 10;
  const streak = getStreak();
  document.getElementById('streakCount').textContent = streak;
}

function getStreak() {
  const s = parseInt(localStorage.getItem('g9Streak') || '0');
  return s;
}

/* ——— RENDER SIDEBAR PROGRESS ——— */
function renderSidebarProgress() {
  if (!manifest) return;
  const groups = manifest.groups;
  const el = document.getElementById('sidebarProgress');
  let html = '';
  groups.forEach(g => {
    const topics = manifest.topics.filter(t => t.group === g.id);
    const totalQ = topics.reduce((a, t) => a + t.mcCount, 0);
    const doneQ = topics.reduce((a, t) => {
      const p = progress[t.id] || {};
      return a + Math.min(p.mcDone || 0, t.mcCount);
    }, 0);
    const pct = totalQ > 0 ? Math.round(doneQ / totalQ * 100) : 0;
    html += `<div class="prog-row">
      <div class="prog-icon">${g.icon}</div>
      <div class="prog-bar-wrap">
        <div class="prog-label">${g.label} <span style="float:right;color:#aaa">${pct}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${g.color}"></div></div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

/* ——— RENDER TOPICS ——— */
function renderTopics() {
  if (!manifest) return;
  const grid = document.getElementById('topicGrid');
  const groups = manifest.groups;
  let html = '';
  groups.forEach(g => {
    const topics = manifest.topics.filter(t =>
      t.group === g.id && (currentGroup === 'all' || currentGroup === g.id)
    );
    if (topics.length === 0) return;
    html += `<div class="group-section" data-group="${g.id}">
      <div class="group-title"><span>${g.icon}</span> ${g.label}</div>
      <div class="topic-cards">`;
    topics.forEach((topic, i) => {
      html += renderTopicCard(topic, i);
    });
    html += `</div></div>`;
  });
  grid.innerHTML = html;
}

function renderTopicCard(topic, idx) {
  const p = progress[topic.id] || {};
  const mcDone = p.mcDone || 0;
  const mcCorrect = p.mcCorrect || 0;
  const pct = topic.mcCount > 0 ? Math.round(Math.min(mcDone, topic.mcCount) / topic.mcCount * 100) : 0;
  const finished = pct >= 100;
  const started = mcDone > 0;

  let btnText = started ? 'Tiếp tục' : 'Bắt đầu';
  let btnColor = topic.color;
  let btnStyle = `background:${btnColor};color:#fff`;

  let crownHTML = finished ? `<div class="crown-badge">👑</div>` : '';

  const accuracy = mcDone > 0 ? Math.round(mcCorrect / mcDone * 100) : null;
  const metaText = accuracy !== null ? `${mcDone}/${topic.mcCount} câu • ${accuracy}% đúng` : `${topic.totalQuestions} câu hỏi`;

  const stats = topicAnswerStats[topic.id] || {
    mcTotal: topic.mcCount || 0,
    mcResolved: 0,
    essayTotal: topic.essayCount || 0,
    essayResolved: 0
  };
  const answerMeta = `MC ${stats.mcResolved}/${stats.mcTotal || topic.mcCount || 0} • Tự luận ${stats.essayResolved}/${stats.essayTotal || topic.essayCount || 0}`;

  return `<div class="topic-card"
      style="border-color:${topic.colorLight};background:linear-gradient(135deg,#fff,${topic.colorLight}22)"
      onclick="openModal('${topic.id}')">
    ${crownHTML}
    <div class="topic-icon" style="background:${topic.colorLight};color:${topic.color}">${topic.icon}</div>
    <div class="topic-info">
      <div class="topic-label" style="color:${topic.color}">${topic.label}</div>
      <div class="topic-title">${topic.title}</div>
      <div class="topic-meta">
        <span>${metaText}</span>
        <span>${answerMeta}</span>
      </div>
      <div class="topic-progress-bar">
        <div class="topic-progress-fill" style="width:${pct}%;background:${topic.color}"></div>
      </div>
    </div>
    <div class="topic-action">
      <button class="btn-start" style="${btnStyle};border:none">${btnText}</button>
    </div>
  </div>`;
}

/* ——— FILTER ——— */
function filterGroup(group, btn) {
  currentGroup = group;
  document.querySelectorAll('.group-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics();
}

/* ——— MODAL ——— */
function openModal(topicId) {
  currentTopic = manifest.topics.find(t => t.id === topicId);
  if (!currentTopic) return;
  const p = progress[topicId] || {};
  const wrongCount = (p.wrong || []).length;
  const stats = topicAnswerStats[topicId] || {
    mcTotal: currentTopic.mcCount || 0,
    mcResolved: 0,
    essayTotal: currentTopic.essayCount || 0,
    essayResolved: 0
  };

  document.getElementById('modalIcon').style.cssText =
    `background:${currentTopic.colorLight};color:${currentTopic.color}`;
  document.getElementById('modalIcon').textContent = currentTopic.icon;
  document.getElementById('modalTitle').textContent = currentTopic.title;
  document.getElementById('modalMeta').textContent =
    `${currentTopic.label} • ${currentTopic.totalQuestions} câu hỏi • ${stats.mcResolved}/${stats.mcTotal || currentTopic.mcCount || 0} câu MC có đáp án`;
  document.getElementById('modalMCCount').textContent = `${stats.mcResolved}/${stats.mcTotal || currentTopic.mcCount || 0}`;
  document.getElementById('modalEssayCount').textContent = `${stats.essayResolved}/${stats.essayTotal || currentTopic.essayCount || 0}`;
  document.getElementById('modalAllCount').textContent = currentTopic.totalQuestions;

  const modeWrongBtn = document.getElementById('modeWrong');
  if (wrongCount > 0) {
    document.getElementById('modeWrongMeta').textContent = `${wrongCount} câu làm sai cần ôn lại`;
    modeWrongBtn.style.opacity = '1';
    modeWrongBtn.style.pointerEvents = 'auto';
  } else {
    document.getElementById('modeWrongMeta').textContent = 'Chưa có câu sai nào (làm trắc nghiệm trước)';
    modeWrongBtn.style.opacity = '0.4';
    modeWrongBtn.style.pointerEvents = 'none';
  }

  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal(e) {
  if (e === null || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.add('hidden');
    currentTopic = null;
  }
}

function startMode(mode) {
  if (!currentTopic) return;
  if (mode === 'theory') {
    window.location.href = `on-thi-tuyen-sinh-g9-theory.html?topic=${encodeURIComponent(currentTopic.id)}`;
    return;
  }
  const url = `on-thi-tuyen-sinh-g9-practice.html?topic=${encodeURIComponent(currentTopic.id)}&mode=${mode}`;
  window.location.href = url;
}

/* ——— BOOT ——— */
init();
</script>
